
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tik Tak!</title>

<style>
  body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
  .screen { display: none; height: 100vh; width: 100vw; position: relative; }
  .active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

  /* FEED */
  #feed { height: 100vh; width: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
  #feed::-webkit-scrollbar { display: none; }
  .video-container { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
  video { width: 100%; height: 100%; object-fit: contain; }

  /* SIDEBAR DE PERFIL */
  #sideProfile {
    position: fixed; top: 0; left: 0; width: 280px; height: 100%; background: #121212; z-index: 50;
    transform: translateX(-100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 40px 15px; 
    box-sizing: border-box; overflow-y: auto;
  }
  #sideProfile.open { transform: translateX(0); }
  #menuOverlay { 
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(0,0,0,0.6); z-index: 45; 
  }
  .avatar-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #fe2c55; margin-bottom: 10px; }

  /* GRID DE VÍDEOS */
  .video-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; width: 100%; margin-top: 20px;
  }
  .video-grid-item {
    width: 100%; aspect-ratio: 9/16; background: #222; object-fit: cover; cursor: pointer; border: 0.5px solid #000;
  }

  /* INTERFACE */
  .btn-main { background: #fe2c55; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
  .video-overlay { position: absolute; bottom: 40px; left: 15px; z-index: 5; pointer-events: none; }
  .side-bar-actions { position: absolute; right: 12px; bottom: 100px; display: flex; flex-direction: column; align-items: center; gap: 18px; z-index: 6; }
  .icon-circle { width: 45px; height: 45px; background: rgba(45, 45, 45, 0.7); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 4px; }
  
  .nav-top { 
    position: fixed; top: 0; width: 100%; padding: 15px 20px; 
    background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); 
    z-index: 10; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box;
  }
  input, textarea { padding: 12px; width: 100%; background: #222; border: 1px solid #333; color: white; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
  #commentModal { display: none; position: fixed; bottom: 0; width: 100%; height: 60%; background: #1a1a1a; z-index: 60; border-radius: 15px 15px 0 0; padding: 20px; box-sizing: border-box; }
</style>
</head>

<body>

<div id="menuOverlay" onclick="toggleMenu()"></div>

<div id="sideProfile">
  <div style="text-align: center;">
    <img id="myAvatar" class="avatar-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
    <h3 id="profileName" style="margin: 5px 0;">@usuario</h3>
    <p id="profileEmail" style="font-size: 10px; color: gray; margin-bottom: 15px;"></p>
  </div>
  
  <div style="display: flex; justify-content: space-around; margin-bottom: 20px; border-top: 1px solid #333; padding-top: 15px;">
    <div style="text-align:center;"><b id="countVideos">0</b><br><small style="color:gray;">Posts</small></div>
    <div style="text-align:center;"><b id="countFollowers">0</b><br><small style="color:gray;">Seguidores</small></div>
  </div>

  <p style="font-size: 12px; font-weight: bold; color: #fe2c55; border-bottom: 1px solid #333; padding-bottom: 5px;">MEUS VÍDEOS</p>
  <div id="myVideosGrid" class="video-grid"></div>

  <div style="margin-top: 30px; border-top: 1px solid #333; padding-top: 20px;">
    <input type="text" id="newAvatarUrl" placeholder="URL da nova foto" style="font-size: 11px;" onchange="atualizarFoto()">
    <button onclick="logout()" style="width:100%; background:none; border:1px solid #444; color:white; padding:10px; border-radius:5px; cursor:pointer;">Sair</button>
  </div>
</div>

<div id="loginScreen" class="screen active">
  <div style="background:#1a1a1a; padding:30px; border-radius:15px; text-align:center; width: 80%; max-width: 350px;">
    <h2 style="color: #fe2c55;">Tik Tak!</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">
    <button class="btn-main" onclick="login()">Entrar</button>
    <button onclick="registrar()" style="background:none; border:none; color:gray; margin-top:15px; cursor:pointer;">Criar conta</button>
  </div>
</div>

<div id="feedScreen" class="screen">
  <div class="nav-top">
    <button onclick="toggleMenu()" style="font-size: 24px; color:white; background:none; border:none; cursor:pointer;">☰</button>
    <span style="font-weight:bold; font-size:20px;">Tik Tak!</span>
    <button onclick="showScreen('uploadScreen')" style="font-size: 28px; color:white; background:none; border:none; cursor:pointer;">+</button>
  </div>
  <div id="feed"></div>
</div>

<div id="visitProfileScreen" class="screen" style="background: #000; overflow-y: auto;">
  <div style="padding: 60px 20px; display: flex; flex-direction: column; align-items: center; width: 100%;">
    <button onclick="showScreen('feedScreen')" style="position: absolute; top: 20px; left: 20px; background: none; border: none; color: white; font-size: 24px; cursor:pointer;">←</button>
    <img id="visitAvatar" class="avatar-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
    <h3 id="visitName">@usuario</h3>
    <div style="display: flex; gap: 30px; margin: 20px 0;">
      <div style="text-align:center;"><b id="visitCountVideos">0</b><br><small style="color:gray;">Posts</small></div>
      <div style="text-align:center;"><b id="visitCountFollowers">0</b><br><small style="color:gray;">Seguidores</small></div>
    </div>
    <button id="visitFollowBtn" class="btn-main" style="width: 150px; margin-bottom: 30px;">Seguir</button>
    <div id="visitGrid" class="video-grid"></div>
  </div>
</div>

<div id="uploadScreen" class="screen" style="background: rgba(0,0,0,0.95);">
  <div style="background:#1a1a1a; padding:30px; border-radius:15px; text-align:center; width: 80%; max-width: 350px;">
    <h3>Novo Post</h3>
    <input type="text" id="videoUrl" placeholder="Link do vídeo .mp4">
    <textarea id="videoDesc" rows="3" placeholder="Legenda..."></textarea>
    <button class="btn-main" onclick="salvarPost()">Publicar</button>
    <button onclick="showScreen('feedScreen')" style="background:none; border:none; color:gray; margin-top:15px; cursor:pointer;">Cancelar</button>
  </div>
</div>

<div id="commentModal">
  <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;">
    <b>Comentários</b>
    <button onclick="fecharComentarios()" style="background:none; border:none; color:white; font-size:28px;">×</button>
  </div>
  <div id="commentList" style="height: 70%; overflow-y: auto;"></div>
  <div style="display:flex; gap:10px; border-top: 1px solid #333; padding-top: 15px;">
    <input type="text" id="newComment" placeholder="Escreva..." style="margin-bottom:0;">
    <button onclick="enviarComentario()" style="background:#fe2c55; border:none; color:white; padding:0 15px; border-radius:8px;">↑</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
// CONFIGURAÇÃO FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCkrysWsEGHnp0XjRR7Uj8pd4e420oYqeU",
  authDomain: "app-tik-tak.firebaseapp.com",
  projectId: "app-tik-tak",
  storageBucket: "app-tik-tak.appspot.com",
  messagingSenderId: "457194424145",
  appId: "1:457194424145:web:6038c37e3044dd495fb570"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
let videoAtualId = null;

// NAVEGAÇÃO
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
  const el = document.getElementById(id);
  el.style.display = (id === 'feedScreen' || id === 'visitProfileScreen') ? 'block' : 'flex';
}

function toggleMenu() {
  const menu = document.getElementById('sideProfile');
  const overlay = document.getElementById('menuOverlay');
  if(menu.classList.contains('open')) {
    menu.classList.remove('open');
    overlay.style.display = 'none';
  } else {
    menu.classList.add('open');
    overlay.style.display = 'block';
    carregarDadosPerfil();
  }
}

// FUNÇÃO PARA VOLTAR AO FEED E SCROLLAR PARA O VÍDEO SELECIONADO
function irParaVideo(videoId) {
  // Fecha menu lateral se estiver aberto
  const menu = document.getElementById('sideProfile');
  if(menu.classList.contains('open')) toggleMenu();

  // Muda para a tela de feed
  showScreen('feedScreen');

  // Aguarda um instante para a tela carregar e faz o scroll
  setTimeout(() => {
    const elemento = document.getElementById("v-" + videoId);
    if(elemento) {
      elemento.scrollIntoView({ behavior: 'smooth' });
      // Tenta dar play no vídeo selecionado
      const v = elemento.querySelector('video');
      if(v) v.play();
    }
  }, 100);
}

// CARREGAR MEU PERFIL (MENU)
function carregarDadosPerfil() {
  const user = auth.currentUser;
  const grid = document.getElementById('myVideosGrid');
  document.getElementById('profileName').innerText = "@" + user.email.split('@')[0];
  document.getElementById('profileEmail').innerText = user.email;
  
  db.collection("usuarios").doc(user.uid).get().then(doc => {
    if(doc.exists && doc.data().foto) document.getElementById('myAvatar').src = doc.data().foto;
  });

  db.collection("videos").where("uid", "==", user.uid).orderBy("data", "desc").get().then(snap => {
    document.getElementById('countVideos').innerText = snap.size;
    grid.innerHTML = "";
    snap.forEach(doc => {
      const v = doc.data();
      const vid = document.createElement("video");
      vid.className = "video-grid-item";
      vid.src = v.url;
      vid.onclick = () => irParaVideo(doc.id); // <--- AQUI CHAMA A FUNÇÃO
      grid.appendChild(vid);
    });
  }).catch(e => console.error("Erro nos meus vídeos:", e));

  db.collection("usuarios").doc(user.uid).collection("seguidores").get().then(snap => {
    document.getElementById('countFollowers').innerText = snap.size;
  });
}

// VISITAR PERFIL DE OUTRO USUÁRIO
async function visitarPerfil(uid, nome) {
  showScreen('visitProfileScreen');
  document.getElementById('visitName').innerText = "@" + nome;
  const grid = document.getElementById('visitGrid');
  grid.innerHTML = "<p style='grid-column: span 3; text-align:center;'>Carregando...</p>";

  db.collection("usuarios").doc(uid).get().then(doc => {
    if(doc.exists && doc.data().foto) document.getElementById('visitAvatar').src = doc.data().foto;
    else document.getElementById('visitAvatar').src = "https://cdn-icons-png.flaticon.com/512/149/149071.png";
  });

  db.collection("videos").where("uid", "==", uid).orderBy("data", "desc").get().then(snap => {
    grid.innerHTML = "";
    document.getElementById('visitCountVideos').innerText = snap.size;
    if(snap.empty) {
        grid.innerHTML = "<p style='grid-column: span 3; text-align:center; color:gray; margin-top:20px;'>Sem posts.</p>";
        return;
    }
    snap.forEach(doc => {
      const v = doc.data();
      const vid = document.createElement("video");
      vid.className = "video-grid-item";
      vid.src = v.url;
      vid.onclick = () => irParaVideo(doc.id); // <--- AQUI TAMBÉM
      grid.appendChild(vid);
    });
  }).catch(err => {
    console.error("Erro ao visitar perfil:", err);
    grid.innerHTML = "<p style='grid-column: span 3; text-align:center; color:red;'>Erro: Verifique o índice no Firebase.</p>";
  });

  db.collection("usuarios").doc(uid).collection("seguidores").get().then(snap => {
    document.getElementById('visitCountFollowers').innerText = snap.size;
  });

  document.getElementById('visitFollowBtn').onclick = () => seguir(uid);
}

// FEED
function carregarVideos() {
  const feed = document.getElementById('feed');
  db.collection("videos").orderBy("data", "desc").onSnapshot(snap => {
    feed.innerHTML = "";
    snap.forEach(doc => {
      const v = doc.data();
      const div = document.createElement("div");
      div.className = "video-container";
      div.id = "v-" + doc.id; // <--- ADICIONADO ID PARA O SCROLL FUNCIONAR
      div.innerHTML = `
        <video src="${v.url}" loop muted playsinline onclick="this.paused ? this.play() : this.pause()"></video>
        <div class="video-overlay">
          <h3 onclick="visitarPerfil('${v.uid}', '${v.autor}')" style="cursor:pointer; pointer-events:auto;">@${v.autor}</h3>
          <p>${v.descricao}</p>
        </div>
        <div class="side-bar-actions" style="pointer-events:auto;">
          <div onclick="curtir('${doc.id}')"><div class="icon-circle">❤️</div><span>${v.likes}</span></div>
          <div onclick="abrirComentarios('${doc.id}')"><div class="icon-circle">💬</div><span>${v.commentsCount || 0}</span></div>
          <div onclick="compartilhar('${doc.id}', '${v.url}')"><div class="icon-circle">🚀</div></div>
          ${v.uid === auth.currentUser.uid ? `<div onclick="excluirVideo('${doc.id}')"><div class="icon-circle" style="color:#ff4d4d">🗑️</div></div>` : ''}
        </div>
      `;
      feed.appendChild(div);
    });
  });
}

// ACÕES
function compartilhar(id, url) {
  db.collection("videos").doc(id).update({ shares: firebase.firestore.FieldValue.increment(1) });
  if (navigator.share) {
    navigator.share({ title: 'Tik Tak!', url: url }).catch(console.error);
  } else {
    navigator.clipboard.writeText(url).then(() => alert("Link copiado!"));
  }
}

function curtir(id) { db.collection("videos").doc(id).update({ likes: firebase.firestore.FieldValue.increment(1) }); }

function seguir(uid) { 
  db.collection("usuarios").doc(auth.currentUser.uid).collection("seguindo").doc(uid).set({data: new Date()});
  db.collection("usuarios").doc(uid).collection("seguidores").doc(auth.currentUser.uid).set({data: new Date()});
  alert("Seguindo!");
}

function salvarPost() {
  const url = document.getElementById('videoUrl').value;
  if(!url) return;
  db.collection("videos").add({
    url: url, descricao: document.getElementById('videoDesc').value, likes: 0, shares: 0, commentsCount: 0,
    uid: auth.currentUser.uid, autor: auth.currentUser.email.split('@')[0], data: new Date()
  }).then(() => {
      document.getElementById('videoUrl').value = "";
      document.getElementById('videoDesc').value = "";
      showScreen('feedScreen');
  });
}

// COMENTÁRIOS E AUTH
function abrirComentarios(id) {
  videoAtualId = id;
  document.getElementById('commentModal').style.display = 'block';
  db.collection("videos").doc(id).collection("comentarios").orderBy("data", "asc").onSnapshot(snap => {
    const list = document.getElementById('commentList');
    list.innerHTML = "";
    snap.forEach(doc => { list.innerHTML += `<div style="margin-bottom:10px;"><b>@${doc.data().autor}</b> ${doc.data().texto}</div>`; });
  });
}
function enviarComentario() {
  const t = document.getElementById('newComment').value;
  if(!t) return;
  db.collection("videos").doc(videoAtualId).collection("comentarios").add({
    autor: auth.currentUser.email.split('@')[0], texto: t, data: new Date()
  }).then(() => {
    document.getElementById('newComment').value = "";
    db.collection("videos").doc(videoAtualId).update({ commentsCount: firebase.firestore.FieldValue.increment(1) });
  });
}
function fecharComentarios() { document.getElementById('commentModal').style.display = 'none'; }
function excluirVideo(id) { if(confirm("Apagar?")) db.collection("videos").doc(id).delete(); }
function login() { auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('senha').value).catch(e => alert(e.message)); }
function registrar() { auth.createUserWithEmailAndPassword(document.getElementById('email').value, document.getElementById('senha').value).catch(e => alert(e.message)); }
function logout() { auth.signOut(); location.reload(); }
function atualizarFoto() {
  const url = document.getElementById('newAvatarUrl').value;
  if(!url) return;
  db.collection("usuarios").doc(auth.currentUser.uid).set({ foto: url }, { merge: true });
}

auth.onAuthStateChanged(user => { if(user) { showScreen('feedScreen'); carregarVideos(); } else showScreen('loginScreen'); });
</script>
</body>
</html>
