<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VideoApp Pro - v3.0</title>

<style>
  body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
  .screen { display: none; height: 100vh; width: 100vw; position: relative; }
  .active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

  /* FEED */
  #feed { height: 100vh; width: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
  #feed::-webkit-scrollbar { display: none; }
  .video-container { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
  video { width: 100%; height: 100%; object-fit: contain; }

  /* SIDEBAR DE PERFIL */
  #sideProfile {
    position: fixed; top: 0; left: 0; width: 280px; height: 100%; background: #121212; z-index: 30;
    transform: translateX(-100%); transition: 0.4s; padding: 30px 20px; box-sizing: border-box;
  }
  #sideProfile.open { transform: translateX(0); }
  .avatar-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #fe2c55; margin-bottom: 10px; }

  /* TELA DE POSTAR COMPACTA */
  .post-card {
    background: #1a1a1a; padding: 25px; border-radius: 15px; width: 85%; max-width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8); text-align: center;
  }

  /* INTERFACE SOBRE O VÍDEO */
  .video-overlay { position: absolute; bottom: 40px; left: 15px; z-index: 5; pointer-events: none; }
  .follow-btn { background: #fe2c55; color: white; border: none; padding: 4px 10px; border-radius: 4px; font-size: 12px; margin-left: 8px; cursor: pointer; pointer-events: auto; }

  .side-bar-actions { position: absolute; right: 12px; bottom: 100px; display: flex; flex-direction: column; align-items: center; gap: 18px; z-index: 6; }
  .action-item { text-align: center; cursor: pointer; }
  .icon-circle { width: 45px; height: 45px; background: rgba(45, 45, 45, 0.7); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 4px; }
  .action-item span { font-size: 11px; font-weight: bold; }

  /* NAVEGAÇÃO */
  .nav-top { position: fixed; top: 0; width: 100%; padding: 15px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); z-index: 10; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box;}
  
  input, textarea { padding: 12px; width: 100%; background: #222; border: 1px solid #333; color: white; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
  .btn-main { background: #fe2c55; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }

  /* MODAL COMENTÁRIOS */
  #commentModal { display: none; position: fixed; bottom: 0; width: 100%; height: 60%; background: #1a1a1a; z-index: 40; border-radius: 15px 15px 0 0; padding: 20px; box-sizing: border-box; }
  #commentList { height: 70%; overflow-y: auto; margin-bottom: 10px; }
</style>
</head>

<body>

<div id="sideProfile">
  <div style="text-align: center;">
    <img id="myAvatar" class="avatar-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
    <h3 id="profileName">@usuario</h3>
    <input type="text" id="newAvatarUrl" placeholder="URL da foto (jpg/png)" style="font-size: 10px;" onchange="atualizarFoto()">
  </div>
  <div style="display: flex; justify-content: space-around; margin: 20px 0; border-top: 1px solid #333; padding-top: 15px;">
    <div style="text-align:center;"><b id="countVideos">0</b><br><small>Vídeos</small></div>
    <div style="text-align:center;"><b id="countFollowers">0</b><br><small>Seguidores</small></div>
  </div>
  <button onclick="logout()" style="width:100%; background:none; border:1px solid #fe2c55; color:#fe2c55; padding:10px; border-radius:5px;">Sair</button>
  <button onclick="toggleMenu()" style="width:100%; margin-top:10px; background:#333; color:white; border:none; padding:10px; border-radius:5px;">Fechar</button>
</div>

<div id="loginScreen" class="screen active">
  <div class="post-card">
    <h2>VideoApp</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">
    <button class="btn-main" onclick="login()">Entrar</button>
    <button onclick="registrar()" style="background:none; border:none; color:gray; margin-top:10px;">Criar conta</button>
  </div>
</div>

<div id="feedScreen" class="screen">
  <div class="nav-top">
    <button onclick="toggleMenu()" style="font-size: 24px; color:white; background:none; border:none;">☰</button>
    <button onclick="showScreen('uploadScreen')" style="font-size: 20px; color:white; background:none; border:none;">+</button>
  </div>
  <div id="feed"></div>
</div>

<div id="uploadScreen" class="screen" style="background: rgba(0,0,0,0.9);">
  <div class="post-card">
    <h3>Novo Post</h3>
    <input type="text" id="videoUrl" placeholder="URL do vídeo (.mp4, .webm, .ogg)">
    <textarea id="videoDesc" rows="2" placeholder="Legenda do vídeo..."></textarea>
    <button class="btn-main" onclick="salvarPost()">Publicar</button>
    <button onclick="showScreen('feedScreen')" style="background:none; border:none; color:white; margin-top:10px;">Cancelar</button>
  </div>
</div>

<div id="commentModal">
  <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:10px;">
    <b>Comentários</b>
    <button onclick="fecharComentarios()" style="background:none; border:none; color:white; font-size:24px;">×</button>
  </div>
  <div id="commentList"></div>
  <div style="display:flex; gap:5px;">
    <input type="text" id="newComment" placeholder="Comentar..." style="margin-bottom:0;">
    <button onclick="enviarComentario()" style="background:#fe2c55; border:none; color:white; border-radius:8px; padding:0 15px;">↑</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCkrysWsEGHnp0XjRR7Uj8pd4e420oYqeU",
  authDomain: "app-tik-tak.firebaseapp.com",
  projectId: "app-tik-tak",
  storageBucket: "app-tik-tak.appspot.com",
  messagingSenderId: "457194424145",
  appId: "1:457194424145:web:6038c37e3044dd495fb570"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let videoAtualId = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
  const el = document.getElementById(id);
  el.style.display = (id === 'feedScreen') ? 'block' : 'flex';
}

function toggleMenu() {
  const menu = document.getElementById('sideProfile');
  menu.classList.toggle('open');
  if(menu.classList.contains('open')) carregarDadosPerfil();
}

function atualizarFoto() {
  const url = document.getElementById('newAvatarUrl').value;
  db.collection("usuarios").doc(auth.currentUser.uid).set({ foto: url }, { merge: true });
  document.getElementById('myAvatar').src = url;
}

function carregarDadosPerfil() {
  const user = auth.currentUser;
  document.getElementById('profileName').innerText = "@" + user.email.split('@')[0];
  
  // Busca foto
  db.collection("usuarios").doc(user.uid).get().then(doc => {
    if(doc.exists && doc.data().foto) document.getElementById('myAvatar').src = doc.data().foto;
  });

  // Conta vídeos postados
  db.collection("videos").where("uid", "==", user.uid).get().then(snap => {
    document.getElementById('countVideos').innerText = snap.size;
  });

  // CONTAGEM DE SEGUIDORES (Corrigido)
  db.collection("usuarios").doc(user.uid).collection("seguidores").get().then(snap => {
    document.getElementById('countFollowers').innerText = snap.size;
  });
}

function login() { auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('senha').value); }
function registrar() { auth.createUserWithEmailAndPassword(document.getElementById('email').value, document.getElementById('senha').value); }
function logout() { auth.signOut(); }

function salvarPost() {
  const url = document.getElementById('videoUrl').value;
  const desc = document.getElementById('videoDesc').value;
  if(!url) return;
  db.collection("videos").add({
    url: url, descricao: desc, likes: 0, shares: 0, commentsCount: 0,
    uid: auth.currentUser.uid, autor: auth.currentUser.email.split('@')[0], data: new Date()
  }).then(() => { showScreen('feedScreen'); carregarVideos(); });
}

function carregarVideos() {
  const feed = document.getElementById('feed');
  db.collection("videos").orderBy("data", "desc").onSnapshot(snap => {
    feed.innerHTML = "";
    snap.forEach(doc => {
      const v = doc.data();
      const div = document.createElement("div");
      div.className = "video-container";
      div.innerHTML = `
        <video src="${v.url}" loop muted playsinline onclick="this.paused ? this.play() : this.pause()"></video>
        <div class="video-overlay">
          <h3>@${v.autor} <button class="follow-btn" onclick="seguir('${v.uid}')">Seguir</button></h3>
          <p>${v.descricao}</p>
        </div>
        <div class="side-bar-actions">
          <div class="action-item" onclick="curtir('${doc.id}')"><div class="icon-circle">❤️</div><span>${v.likes}</span></div>
          <div class="action-item" onclick="abrirComentarios('${doc.id}')"><div class="icon-circle">💬</div><span>${v.commentsCount || 0}</span></div>
          <div class="action-item" onclick="compartilhar('${doc.id}', '${v.url}')"><div class="icon-circle">🚀</div><span>${v.shares || 0}</span></div>
          ${v.uid === auth.currentUser.uid ? `<div class="action-item" onclick="excluirVideo('${doc.id}')"><div class="icon-circle" style="color:#ff4d4d">🗑️</div></div>` : ''}
        </div>
      `;
      feed.appendChild(div);
    });
  });
}

// LOGICA DE SEGUIR (Corrigida para subir o número)
function seguir(uidSeguido) {
  if(uidSeguido === auth.currentUser.uid) return alert("Você não pode seguir a si mesmo!");
  
  // 1. Adiciona na lista de quem você segue
  db.collection("usuarios").doc(auth.currentUser.uid).collection("seguindo").doc(uidSeguido).set({ data: new Date() });
  
  // 2. Adiciona na lista de seguidores da pessoa (para o número subir para ela)
  db.collection("usuarios").doc(uidSeguido).collection("seguidores").doc(auth.currentUser.uid).set({ data: new Date() })
  .then(() => alert("Você agora segue este usuário!"));
}

function compartilhar(id, url) {
  db.collection("videos").doc(id).update({ shares: firebase.firestore.FieldValue.increment(1) });
  if(navigator.share) {
    navigator.share({ title: 'VideoApp', url: url });
  } else {
    navigator.clipboard.writeText(url);
    alert("Link copiado!");
  }
}

function abrirComentarios(id) {
  videoAtualId = id;
  document.getElementById('commentModal').style.display = 'block';
  db.collection("videos").doc(id).collection("comentarios").orderBy("data", "asc").onSnapshot(snap => {
    const list = document.getElementById('commentList');
    list.innerHTML = "";
    snap.forEach(cDoc => {
      const c = cDoc.data();
      list.innerHTML += `<div style="margin-bottom:10px; font-size:14px;"><b>@${c.autor}</b>: ${c.texto}</div>`;
    });
  });
}

function enviarComentario() {
  const texto = document.getElementById('newComment').value;
  if(!texto) return;
  const ref = db.collection("videos").doc(videoAtualId);
  ref.collection("comentarios").add({ autor: auth.currentUser.email.split('@')[0], texto: texto, data: new Date() })
  .then(() => {
    document.getElementById('newComment').value = "";
    ref.update({ commentsCount: firebase.firestore.FieldValue.increment(1) });
  });
}

function fecharComentarios() { document.getElementById('commentModal').style.display = 'none'; }
function excluirVideo(id) { if(confirm("Apagar vídeo?")) db.collection("videos").doc(id).delete(); }
function curtir(id) { db.collection("videos").doc(id).update({ likes: firebase.firestore.FieldValue.increment(1) }); }

auth.onAuthStateChanged(user => { if(user) { showScreen('feedScreen'); carregarVideos(); } else showScreen('loginScreen'); });
</script>
</body>
</html>
