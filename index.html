<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tik Tak!</title>

<style>
  body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
  .screen { display: none; height: 100vh; width: 100vw; position: relative; }
  .active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

  /* FEED */
  #feed { height: 100vh; width: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
  #feed::-webkit-scrollbar { display: none; }
  .video-container { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
  video { width: 100%; height: 100%; object-fit: contain; }

  /* SIDEBAR DE PERFIL */
  #sideProfile {
    position: fixed; top: 0; left: 0; width: 280px; height: 100%; background: #121212; z-index: 50;
    transform: translateX(-100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 40px 20px; box-sizing: border-box;
  }
  #sideProfile.open { transform: translateX(0); }
  #menuOverlay { 
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(0,0,0,0.6); z-index: 45; 
  }
  .avatar-img { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 2px solid #fe2c55; margin-bottom: 15px; }

  /* TELA DE POSTAR */
  .post-card {
    background: #1a1a1a; padding: 25px; border-radius: 15px; width: 85%; max-width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.8); text-align: center;
  }

  /* INTERFACE SOBRE O VÍDEO */
  .video-overlay { position: absolute; bottom: 40px; left: 15px; z-index: 5; pointer-events: none; }
  .follow-btn { background: #fe2c55; color: white; border: none; padding: 5px 12px; border-radius: 4px; font-size: 12px; margin-left: 8px; cursor: pointer; pointer-events: auto; font-weight: bold; }

  .side-bar-actions { position: absolute; right: 12px; bottom: 100px; display: flex; flex-direction: column; align-items: center; gap: 18px; z-index: 6; }
  .action-item { text-align: center; cursor: pointer; }
  .icon-circle { width: 45px; height: 45px; background: rgba(45, 45, 45, 0.7); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 4px; }
  .action-item span { font-size: 11px; font-weight: bold; }

  /* NAVEGAÇÃO TOPO */
  .nav-top { 
    position: fixed; top: 0; width: 100%; padding: 15px 20px; 
    background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); 
    z-index: 10; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box;
  }
  .app-brand { display: flex; align-items: center; gap: 10px; }
  .app-name { font-weight: bold; font-size: 20px; letter-spacing: -0.5px; }
  
  input, textarea { padding: 12px; width: 100%; background: #222; border: 1px solid #333; color: white; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
  .btn-main { background: #fe2c55; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }

  /* MODAL COMENTÁRIOS */
  #commentModal { display: none; position: fixed; bottom: 0; width: 100%; height: 60%; background: #1a1a1a; z-index: 40; border-radius: 15px 15px 0 0; padding: 20px; box-sizing: border-box; }
  #commentList { height: 70%; overflow-y: auto; margin-bottom: 10px; }
</style>
</head>

<body>

<div id="menuOverlay" onclick="toggleMenu()"></div>

<div id="sideProfile">
  <div style="text-align: center; margin-bottom: 30px;">
    <img id="myAvatar" class="avatar-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
    <h3 id="profileName" style="margin: 0;">@usuario</h3>
    <p id="profileEmail" style="font-size: 11px; color: gray; margin-top: 5px;"></p>
  </div>
  
  <div style="display: flex; justify-content: space-around; margin: 20px 0; border-top: 1px solid #333; padding-top: 20px;">
    <div style="text-align:center;"><b id="countVideos">0</b><br><small style="color:gray;">Vídeos</small></div>
    <div style="text-align:center;"><b id="countFollowers">0</b><br><small style="color:gray;">Seguidores</small></div>
  </div>

  <div style="margin-top: 40px;">
    <p style="font-size: 10px; color: gray; text-transform: uppercase; font-weight: bold;">Configurações</p>
    <input type="text" id="newAvatarUrl" placeholder="Nova URL da foto" style="font-size: 11px;" onchange="atualizarFoto()">
    <button onclick="logout()" style="width:100%; background:none; border:1px solid #333; color:white; padding:12px; border-radius:5px; cursor:pointer; margin-top: 10px;">Sair da conta</button>
  </div>
</div>

<div id="loginScreen" class="screen active">
  <div class="post-card">
    <h2 style="color: #fe2c55;">Tik Tak!</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">
    <button class="btn-main" onclick="login()">Entrar</button>
    <button onclick="registrar()" style="background:none; border:none; color:gray; margin-top:15px; cursor:pointer;">Ainda não tem conta? <b style="color:white;">Criar agora</b></button>
  </div>
</div>

<div id="feedScreen" class="screen">
  <div class="nav-top">
    <div class="app-brand">
      <button onclick="toggleMenu()" style="font-size: 24px; color:white; background:none; border:none; cursor:pointer; padding:0;">☰</button>
      <span class="app-name">Tik Tak! </span>
    </div>
    <button onclick="showScreen('uploadScreen')" style="font-size: 28px; color:white; background:none; border:none; cursor:pointer;">+</button>
  </div>
  <div id="feed"></div>
</div>

<div id="uploadScreen" class="screen" style="background: rgba(0,0,0,0.95);">
  <div class="post-card">
    <h3>Novo Post</h3>
    <input type="text" id="videoUrl" placeholder="URL do vídeo (mp4, webm)">
    <textarea id="videoDesc" rows="3" placeholder="Escreva uma legenda..."></textarea>
    <button class="btn-main" onclick="salvarPost()">Publicar agora</button>
    <button onclick="showScreen('feedScreen')" style="background:none; border:none; color:gray; margin-top:15px; cursor:pointer;">Voltar ao feed</button>
  </div>
</div>

<div id="commentModal">
  <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;">
    <b style="font-size: 18px;">Comentários</b>
    <button onclick="fecharComentarios()" style="background:none; border:none; color:white; font-size:28px; cursor:pointer;">×</button>
  </div>
  <div id="commentList"></div>
  <div style="display:flex; gap:10px; border-top: 1px solid #333; padding-top: 15px;">
    <input type="text" id="newComment" placeholder="Adicionar comentário..." style="margin-bottom:0;">
    <button onclick="enviarComentario()" style="background:#fe2c55; border:none; color:white; border-radius:8px; padding:0 20px; font-weight:bold;">↑</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCkrysWsEGHnp0XjRR7Uj8pd4e420oYqeU",
  authDomain: "app-tik-tak.firebaseapp.com",
  projectId: "app-tik-tak",
  storageBucket: "app-tik-tak.appspot.com",
  messagingSenderId: "457194424145",
  appId: "1:457194424145:web:6038c37e3044dd495fb570"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let videoAtualId = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
  const el = document.getElementById(id);
  el.style.display = (id === 'feedScreen') ? 'block' : 'flex';
}

function toggleMenu() {
  const menu = document.getElementById('sideProfile');
  const overlay = document.getElementById('menuOverlay');
  const isOpen = menu.classList.contains('open');
  
  if(isOpen) {
    menu.classList.remove('open');
    overlay.style.display = 'none';
  } else {
    menu.classList.add('open');
    overlay.style.display = 'block';
    carregarDadosPerfil();
  }
}

function atualizarFoto() {
  const url = document.getElementById('newAvatarUrl').value;
  if(!url) return;
  db.collection("usuarios").doc(auth.currentUser.uid).set({ foto: url }, { merge: true });
  document.getElementById('myAvatar').src = url;
}

function carregarDadosPerfil() {
  const user = auth.currentUser;
  document.getElementById('profileName').innerText = "@" + user.email.split('@')[0];
  document.getElementById('profileEmail').innerText = user.email;
  
  db.collection("usuarios").doc(user.uid).get().then(doc => {
    if(doc.exists && doc.data().foto) document.getElementById('myAvatar').src = doc.data().foto;
  });

  db.collection("videos").where("uid", "==", user.uid).get().then(snap => {
    document.getElementById('countVideos').innerText = snap.size;
  });

  db.collection("usuarios").doc(user.uid).collection("seguidores").get().then(snap => {
    document.getElementById('countFollowers').innerText = snap.size;
  });
}

function login() { auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('senha').value).catch(e => alert(e.message)); }
function registrar() { auth.createUserWithEmailAndPassword(document.getElementById('email').value, document.getElementById('senha').value).catch(e => alert(e.message)); }
function logout() { auth.signOut(); if(document.getElementById('sideProfile').classList.contains('open')) toggleMenu(); }

function salvarPost() {
  const url = document.getElementById('videoUrl').value;
  const desc = document.getElementById('videoDesc').value;
  if(!url) return;
  db.collection("videos").add({
    url: url, descricao: desc, likes: 0, shares: 0, commentsCount: 0,
    uid: auth.currentUser.uid, autor: auth.currentUser.email.split('@')[0], data: new Date()
  }).then(() => { 
    showScreen('feedScreen'); 
    document.getElementById('videoUrl').value = "";
    document.getElementById('videoDesc').value = "";
  });
}

function carregarVideos() {
  const feed = document.getElementById('feed');
  db.collection("videos").orderBy("data", "desc").onSnapshot(snap => {
    feed.innerHTML = "";
    snap.forEach(doc => {
      const v = doc.data();
      const div = document.createElement("div");
      div.className = "video-container";
      div.innerHTML = `
        <video src="${v.url}" loop muted playsinline onclick="this.paused ? this.play() : this.pause()"></video>
        <div class="video-overlay">
          <h3>@${v.autor} <button class="follow-btn" onclick="seguir('${v.uid}')">Seguir</button></h3>
          <p>${v.descricao}</p>
        </div>
        <div class="side-bar-actions">
          <div class="action-item" onclick="curtir('${doc.id}')"><div class="icon-circle">❤️</div><span>${v.likes}</span></div>
          <div class="action-item" onclick="abrirComentarios('${doc.id}')"><div class="icon-circle">💬</div><span>${v.commentsCount || 0}</span></div>
          <div class="action-item" onclick="compartilhar('${doc.id}', '${v.url}')"><div class="icon-circle">🚀</div><span>${v.shares || 0}</span></div>
          ${v.uid === auth.currentUser.uid ? `<div class="action-item" onclick="excluirVideo('${doc.id}')"><div class="icon-circle" style="color:#ff4d4d">🗑️</div></div>` : ''}
        </div>
      `;
      feed.appendChild(div);
    });
  });
}

function seguir(uidSeguido) {
  if(uidSeguido === auth.currentUser.uid) return alert("Você não pode seguir a si mesmo!");
  db.collection("usuarios").doc(auth.currentUser.uid).collection("seguindo").doc(uidSeguido).set({ data: new Date() });
  db.collection("usuarios").doc(uidSeguido).collection("seguidores").doc(auth.currentUser.uid).set({ data: new Date() })
  .then(() => alert("Você agora segue @"+uidSeguido.substring(0,5)));
}

function curtir(id) { db.collection("videos").doc(id).update({ likes: firebase.firestore.FieldValue.increment(1) }); }

function compartilhar(id, url) {
  db.collection("videos").doc(id).update({ shares: firebase.firestore.FieldValue.increment(1) });
  if(navigator.share) {
    navigator.share({ title: 'VideoApp', url: url });
  } else {
    navigator.clipboard.writeText(url);
    alert("Link copiado!");
  }
}

function abrirComentarios(id) {
  videoAtualId = id;
  document.getElementById('commentModal').style.display = 'block';
  db.collection("videos").doc(id).collection("comentarios").orderBy("data", "asc").onSnapshot(snap => {
    const list = document.getElementById('commentList');
    list.innerHTML = "";
    snap.forEach(cDoc => {
      const c = cDoc.data();
      list.innerHTML += `<div style="margin-bottom:12px; font-size:14px; line-height:1.4;"><b>@${c.autor}</b> ${c.texto}</div>`;
    });
  });
}

function enviarComentario() {
  const texto = document.getElementById('newComment').value;
  if(!texto) return;
  const ref = db.collection("videos").doc(videoAtualId);
  ref.collection("comentarios").add({ 
    autor: auth.currentUser.email.split('@')[0], 
    texto: texto, 
    data: new Date() 
  }).then(() => {
    document.getElementById('newComment').value = "";
    ref.update({ commentsCount: firebase.firestore.FieldValue.increment(1) });
  });
}

function fecharComentarios() { document.getElementById('commentModal').style.display = 'none'; }
function excluirVideo(id) { if(confirm("Deseja apagar este vídeo permanentemente?")) db.collection("videos").doc(id).delete(); }

auth.onAuthStateChanged(user => { if(user) { showScreen('feedScreen'); carregarVideos(); } else showScreen('loginScreen'); });
</script>
</body>
</html>
