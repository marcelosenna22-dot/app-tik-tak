<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VideoApp Pro - TikTok Clone</title>

<style>
  body {
    margin: 0;
    background: #000;
    color: white;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    overflow: hidden;
  }

  .screen {
    display: none;
    height: 100vh;
    width: 100vw;
    position: relative;
  }

  .active {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* FEED */
  #feed {
    height: 100vh;
    width: 100%;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scrollbar-width: none;
  }
  #feed::-webkit-scrollbar { display: none; }

  .video-container {
    height: 100vh;
    width: 100%;
    scroll-snap-align: start;
    position: relative;
    background: #000;
    display: flex;
    align-items: center;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  /* INTERFACE SOBRE O VÍDEO */
  .video-overlay {
    position: absolute;
    bottom: 40px;
    left: 15px;
    z-index: 5;
    max-width: 70%;
    pointer-events: none;
  }

  .video-overlay h3 { margin: 0; font-size: 16px; color: #fff; }
  .video-overlay p { margin: 8px 0; font-size: 14px; line-height: 1.4; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }

  .side-bar {
    position: absolute;
    right: 12px;
    bottom: 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    z-index: 6;
  }

  .action-item {
    text-align: center;
    cursor: pointer;
  }

  .icon-circle {
    width: 45px;
    height: 45px;
    background: rgba(40, 40, 40, 0.6);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    margin-bottom: 4px;
  }

  .action-item span { font-size: 12px; font-weight: bold; }

  /* NAVEGAÇÃO */
  .nav-top {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
    z-index: 10;
    display: flex;
    justify-content: center;
    gap: 20px;
  }

  .nav-top button {
    background: none;
    border: none;
    color: white;
    font-size: 16px;
    font-weight: bold;
    opacity: 0.6;
  }
  .nav-top button.active-nav { opacity: 1; border-bottom: 2px solid #fff; }

  /* FORMULÁRIOS */
  input, textarea {
    padding: 14px;
    width: 85%;
    max-width: 320px;
    background: #1a1a1a;
    border: 1px solid #333;
    color: white;
    border-radius: 8px;
    margin-bottom: 12px;
    font-family: inherit;
  }

  .btn-main {
    background: #fe2c55;
    color: white;
    border: none;
    padding: 15px;
    width: 85%;
    max-width: 320px;
    border-radius: 4px;
    font-weight: bold;
    cursor: pointer;
  }
</style>
</head>

<body>

<div id="loginScreen" class="screen active">
  <h1 style="margin-bottom: 20px;">VideoApp</h1>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Senha">
  <button class="btn-main" onclick="login()">Entrar</button>
  <button onclick="registrar()" style="background:none; border:none; color:gray; margin-top:15px;">Criar nova conta</button>
</div>

<div id="feedScreen" class="screen">
  <div class="nav-top">
    <button class="active-nav">Para você</button>
    <button onclick="showScreen('uploadScreen')">+ Postar</button>
    <button onclick="logout()">Sair</button>
  </div>
  <div id="feed"></div>
</div>

<div id="uploadScreen" class="screen" style="background: #000;">
  <h2 style="margin-bottom: 20px;">Novo Post</h2>
  <input type="text" id="videoUrl" placeholder="URL do vídeo (.mp4)">
  <textarea id="videoDesc" rows="3" placeholder="Escreva uma legenda incrível..."></textarea>
  <button class="btn-main" onclick="salvarPost()">Publicar</button>
  <button onclick="showScreen('feedScreen')" style="background:none; border:none; color:white; margin-top:15px;">Cancelar</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCkrysWsEGHnp0XjRR7Uj8pd4e420oYqeU",
  authDomain: "app-tik-tak.firebaseapp.com",
  projectId: "app-tik-tak",
  storageBucket: "app-tik-tak.appspot.com",
  messagingSenderId: "457194424145",
  appId: "1:457194424145:web:6038c37e3044dd495fb570"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// NAVEGAÇÃO
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
  const el = document.getElementById(id);
  el.style.display = (id === 'feedScreen') ? 'block' : 'flex';
}

// AUTH
function login() {
  const e = document.getElementById('email').value;
  const s = document.getElementById('senha').value;
  auth.signInWithEmailAndPassword(e, s).catch(err => alert(err.message));
}

function registrar() {
  const e = document.getElementById('email').value;
  const s = document.getElementById('senha').value;
  auth.createUserWithEmailAndPassword(e, s).catch(err => alert(err.message));
}

function logout() { auth.signOut(); }

// POSTAR VÍDEO
function salvarPost() {
  const url = document.getElementById('videoUrl').value;
  const desc = document.getElementById('videoDesc').value;

  if(!url || url.length < 10) return alert("Insira uma URL válida");

  db.collection("videos").add({
    url: url,
    descricao: desc || "Sem legenda",
    likes: 0,
    autor: auth.currentUser.email.split('@')[0],
    data: new Date()
  }).then(() => {
    document.getElementById('videoUrl').value = "";
    document.getElementById('videoDesc').value = "";
    showScreen('feedScreen');
    carregarVideos();
  });
}

// CARREGAR FEED
function carregarVideos() {
  const feed = document.getElementById('feed');
  db.collection("videos").orderBy("data", "desc").get().then(snap => {
    feed.innerHTML = "";
    snap.forEach(doc => {
      const v = doc.data();
      const div = document.createElement("div");
      div.className = "video-container";
      div.innerHTML = `
        <video src="${v.url}" loop muted playsinline onclick="this.paused ? this.play() : this.pause()"></video>
        
        <div class="video-overlay">
          <h3>@${v.autor || 'usuario'}</h3>
          <p>${v.descricao}</p>
        </div>

        <div class="side-bar">
          <div class="action-item" onclick="curtir('${doc.id}', this)">
            <div class="icon-circle">❤️</div>
            <span>${v.likes || 0}</span>
          </div>
          <div class="action-item">
            <div class="icon-circle">💬</div>
            <span>0</span>
          </div>
          <div class="action-item" onclick="compartilhar('${v.url}', '${v.descricao}')">
            <div class="icon-circle">🚀</div>
            <span>Share</span>
          </div>
        </div>
      `;
      feed.appendChild(div);
    });
    iniciarObserver();
  });
}

// CURTIR
function curtir(id, el) {
  const span = el.querySelector("span");
  let n = parseInt(span.innerText) + 1;
  span.innerText = n;
  db.collection("videos").doc(id).update({ likes: n });
}

// COMPARTILHAR FUNCIONAL
async function compartilhar(url, desc) {
  if (navigator.share) {
    try {
      await navigator.share({
        title: 'VideoApp',
        text: desc,
        url: url
      });
    } catch (err) { console.log("Erro ao compartilhar"); }
  } else {
    navigator.clipboard.writeText(url);
    alert("Link copiado!");
  }
}

// AUTO PLAY
function iniciarObserver() {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if(e.isIntersecting) e.target.play().catch(()=>{});
      else e.target.pause();
    });
  }, { threshold: 0.6 });
  document.querySelectorAll('video').forEach(v => observer.observe(v));
}

// MONITOR DE AUTH
auth.onAuthStateChanged(user => {
  if (user) {
    showScreen('feedScreen');
    carregarVideos();
  } else {
    showScreen('loginScreen');
  }
});
</script>

</body>
</html>
