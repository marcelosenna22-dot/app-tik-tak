<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Vídeos - Link Edition</title>

<style>
  body {
    margin: 0;
    background: #000;
    color: white;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  .screen {
    display: none;
    padding: 20px;
    text-align: center;
  }

  .active {
    display: block;
  }

  /* Feed estilo TikTok */
  #feed {
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
  }

  .video-container {
    height: 100vh;
    scroll-snap-align: start;
    position: relative;
    background: #111;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: contain; /* Ajusta o vídeo sem cortar */
  }

  /* Botões e Inputs */
  button {
    padding: 12px 20px;
    margin: 10px 5px;
    background: #fe2c55; /* Cor estilo TikTok */
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
  }

  input {
    padding: 12px;
    width: 80%;
    max-width: 300px;
    border-radius: 5px;
    border: 1px solid #333;
    background: #222;
    color: white;
    margin-bottom: 10px;
  }

  /* Curtir */
  .like-btn {
    position: absolute;
    right: 20px;
    bottom: 120px;
    font-size: 24px;
    background: rgba(0,0,0,0.6);
    padding: 15px;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .like-btn:active {
    transform: scale(1.2);
  }

  .nav-top {
    position: fixed;
    top: 10px;
    left: 0;
    right: 0;
    z-index: 10;
    display: flex;
    justify-content: center;
    gap: 10px;
  }
</style>
</head>

<body>

<div id="loginScreen" class="screen active">
  <h2 style="margin-top: 50px;">Bem-vindo ao VídeoApp</h2>
  <input type="email" id="email" placeholder="Seu Email"><br>
  <input type="password" id="senha" placeholder="Sua Senha"><br>
  <button onclick="login()">Entrar</button>
  <button onclick="registrar()" style="background: #444;">Criar Conta</button>
</div>

<div id="feedScreen" class="screen" style="padding: 0;">
  <div class="nav-top">
    <button onclick="mostrarUpload()">+ Enviar</button>
    <button onclick="logout()" style="background: #333;">Sair</button>
  </div>
  <div id="feed"></div>
</div>

<div id="uploadScreen" class="screen">
  <h2 style="margin-top: 40px;">Postar novo vídeo</h2>
  <p>Cole a URL direta do vídeo (.mp4)</p>
  <input type="text" id="videoUrl" placeholder="https://exemplo.com/video.mp4"><br>
  <button onclick="salvarNoBanco()">Publicar Agora</button><br>
  <button onclick="voltarFeed()" style="background: #333;">Cancelar</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
// CONFIGURAÇÃO DO SEU FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCkrysWsEGHnp0XjRR7Uj8pd4e420oYqeU",
  authDomain: "app-tik-tak.firebaseapp.com",
  projectId: "app-tik-tak",
  storageBucket: "app-tik-tak.appspot.com",
  messagingSenderId: "457194424145",
  appId: "1:457194424145:web:6038c37e3044dd495fb570"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// --- NAVEGAÇÃO ---
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// --- AUTENTICAÇÃO ---
function login() {
  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;
  auth.signInWithEmailAndPassword(email, senha)
    .catch(err => alert("Erro ao entrar: " + err.message));
}

function registrar() {
  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;
  auth.createUserWithEmailAndPassword(email, senha)
    .catch(err => alert("Erro ao criar conta: " + err.message));
}

function logout() {
  auth.signOut();
}

// --- LÓGICA DE VÍDEOS (OPÇÃO B) ---
function salvarNoBanco() {
  const url = document.getElementById('videoUrl').value;

  if(!url || url.length < 10) {
    alert("Insira uma URL válida de vídeo!");
    return;
  }

  // Salvamos apenas o link no Firestore
  db.collection("videos").add({
    url: url,
    likes: 0,
    data: new Date()
  })
  .then(() => {
    alert("Vídeo postado!");
    document.getElementById('videoUrl').value = ""; // Limpa campo
    showScreen('feedScreen');
    carregarVideos();
  })
  .catch(err => alert("Erro ao salvar: " + err.message));
}

function carregarVideos() {
  const feed = document.getElementById('feed');
  
  db.collection("videos").orderBy("data", "desc").get()
    .then(snapshot => {
      feed.innerHTML = "";
      snapshot.forEach(doc => {
        const videoData = doc.data();
        const id = doc.id;

        const container = document.createElement("div");
        container.className = "video-container";
        container.innerHTML = `
          <video src="${videoData.url}" loop muted playsinline></video>
          <div class="like-btn" onclick="curtir('${id}', this)">
            ❤️ <span style="font-size: 16px;">${videoData.likes || 0}</span>
          </div>
        `;
        feed.appendChild(container);
      });
      configurarAutoPlay();
    });
}

function curtir(id, elemento) {
  const span = elemento.querySelector("span");
  let atual = parseInt(span.innerText);
  atual++;
  span.innerText = atual;

  db.collection("videos").doc(id).update({
    likes: atual
  });
}

// --- UTILITÁRIOS ---
function configurarAutoPlay() {
  const videos = document.querySelectorAll("video");
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.play().catch(() => {}); // Tenta dar play automático
      } else {
        entry.target.pause();
      }
    });
  }, { threshold: 0.6 });

  videos.forEach(v => observer.observe(v));
}

function mostrarUpload() { showScreen('uploadScreen'); }
function voltarFeed() { showScreen('feedScreen'); }

// --- OBSERVAR LOGIN ---
auth.onAuthStateChanged(user => {
  if (user) {
    showScreen('feedScreen');
    carregarVideos();
  } else {
    showScreen('loginScreen');
  }
});
</script>

</body>
</html>
