<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tik Tak VideoApp</title>

<style>
  body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
  .screen { display: none; height: 100vh; width: 100vw; position: relative; }
  .active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

  /* FEED */
  #feed { height: 100vh; width: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
  #feed::-webkit-scrollbar { display: none; }
  .video-container { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; }
  video { width: 100%; height: 100%; object-fit: contain; }

  /* SIDEBAR DE PERFIL (ESQUERDA) */
  #sideProfile {
    position: fixed;
    top: 0;
    left: 0;
    width: 280px;
    height: 100%;
    background: #121212;
    z-index: 30;
    transform: translateX(-100%);
    transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 5px 0 15px rgba(0,0,0,0.5);
    padding: 30px 20px;
    box-sizing: border-box;
  }
  #sideProfile.open { transform: translateX(0); }
  
  .profile-header { text-align: center; margin-bottom: 30px; }
  .avatar { width: 80px; height: 80px; background: #fe2c55; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 30px; }
  .stats { display: flex; justify-content: space-around; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }
  .stat-item { text-align: center; }
  .stat-item b { display: block; font-size: 18px; }
  .stat-item span { font-size: 12px; color: gray; }

  /* OVERLAY PARA FECHAR MENU */
  #menuOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 25; }

  /* INTERFACE SOBRE O VÍDEO */
  .video-overlay { position: absolute; bottom: 40px; left: 15px; z-index: 5; max-width: 70%; pointer-events: none; }
  .video-overlay h3 { margin: 0; font-size: 16px; text-shadow: 1px 1px 3px #000; }
  .video-overlay p { margin: 8px 0; font-size: 14px; text-shadow: 1px 1px 3px #000; }

  .side-bar-actions { position: absolute; right: 12px; bottom: 100px; display: flex; flex-direction: column; align-items: center; gap: 18px; z-index: 6; }
  .action-item { text-align: center; cursor: pointer; }
  .icon-circle { width: 45px; height: 45px; background: rgba(45, 45, 45, 0.7); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 4px; }
  .action-item span { font-size: 11px; font-weight: bold; }

  /* NAVEGAÇÃO */
  .nav-top { position: fixed; top: 0; width: 100%; padding: 15px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); z-index: 10; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box;}
  .nav-top .center-btns { display: flex; gap: 15px; position: absolute; left: 50%; transform: translateX(-50%); }
  .nav-top button { background: none; border: none; color: white; font-weight: bold; cursor: pointer; }

  /* MODAL COMENTÁRIOS */
  #commentModal { display: none; position: fixed; bottom: 0; width: 100%; height: 60%; background: #1a1a1a; z-index: 20; border-radius: 15px 15px 0 0; padding: 20px; box-sizing: border-box; }
  #commentList { height: 75%; overflow-y: auto; margin-bottom: 10px; }
  .comment-item { display: flex; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 5px; }

  /* FORMULÁRIOS */
  input, textarea { padding: 12px; width: 85%; max-width: 320px; background: #222; border: 1px solid #333; color: white; border-radius: 8px; margin-bottom: 10px; }
  .btn-main { background: #fe2c55; color: white; border: none; padding: 15px; width: 85%; max-width: 320px; border-radius: 5px; font-weight: bold; cursor: pointer; }
</style>
</head>

<body>

<div id="menuOverlay" onclick="toggleMenu()"></div>
<div id="sideProfile">
  <div class="profile-header">
    <div class="avatar">👤</div>
    <h3 id="profileName">@usuario</h3>
    <p id="profileEmail" style="font-size: 12px; color: gray;"></p>
  </div>
  
  <div class="stats">
    <div class="stat-item"><b id="countVideos">0</b><span>Vídeos</span></div>
    <div class="stat-item"><b>0</b><span>Seguidores</span></div>
  </div>

  <div style="margin-top: 50px;">
    <button onclick="showScreen('uploadScreen'); toggleMenu()" style="width: 100%; padding: 12px; background: #333; color: white; border: none; border-radius: 5px; margin-bottom: 10px;">+ Novo Vídeo</button>
    <button onclick="logout()" style="width: 100%; padding: 12px; background: none; color: #fe2c55; border: 1px solid #fe2c55; border-radius: 5px;">Sair da Conta</button>
  </div>
</div>

<div id="loginScreen" class="screen active">
  <h1>TikTak VideoApp</h1>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Senha">
  <button class="btn-main" onclick="login()">Entrar</button>
  <button onclick="registrar()" style="background:none; border:none; color:gray; margin-top:10px;">Criar conta</button>
</div>

<div id="feedScreen" class="screen">
  <div class="nav-top">
    <button onclick="toggleMenu()" style="font-size: 24px;">☰</button>
    <div class="center-btns">
      <button onclick="carregarVideos()">Para você</button>
    </div>
    <button onclick="showScreen('uploadScreen')" style="font-size: 20px;">+</button>
  </div>
  <div id="feed"></div>
</div>

<div id="uploadScreen" class="screen">
  <h2>Novo Post</h2>
  <input type="text" id="videoUrl" placeholder="URL do vídeo (.mp4)">
  <textarea id="videoDesc" rows="3" placeholder="Legenda do vídeo..."></textarea>
  <button class="btn-main" onclick="salvarPost()">Publicar</button>
  <button onclick="showScreen('feedScreen')" style="color:white; background:none; border:none; margin-top:10px;">Voltar</button>
</div>

<div id="commentModal">
  <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;">
    <strong>Comentários</strong>
    <button onclick="fecharComentarios()" style="background:none; border:none; color:white; font-size:25px;">×</button>
  </div>
  <div id="commentList"></div>
  <div style="display:flex; gap:5px;">
    <input type="text" id="newComment" placeholder="Escreva algo..." style="margin-bottom:0;">
    <button onclick="enviarComentario()" style="background:#fe2c55; border:none; color:white; border-radius:8px; padding:0 15px;">↑</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCkrysWsEGHnp0XjRR7Uj8pd4e420oYqeU",
  authDomain: "app-tik-tak.firebaseapp.com",
  projectId: "app-tik-tak",
  storageBucket: "app-tik-tak.appspot.com",
  messagingSenderId: "457194424145",
  appId: "1:457194424145:web:6038c37e3044dd495fb570"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let videoAtualId = null;

// CONTROLE DO MENU
function toggleMenu() {
  const menu = document.getElementById('sideProfile');
  const overlay = document.getElementById('menuOverlay');
  const isOpen = menu.classList.contains('open');
  
  if(isOpen) {
    menu.classList.remove('open');
    overlay.style.display = 'none';
  } else {
    menu.classList.add('open');
    overlay.style.display = 'block';
    carregarDadosPerfil();
  }
}

function carregarDadosPerfil() {
  const user = auth.currentUser;
  document.getElementById('profileName').innerText = "@" + user.email.split('@')[0];
  document.getElementById('profileEmail').innerText = user.email;
  
  // Conta vídeos do usuário
  db.collection("videos").where("uid", "==", user.uid).get().then(snap => {
    document.getElementById('countVideos').innerText = snap.size;
  });
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
  const el = document.getElementById(id);
  el.style.display = (id === 'feedScreen') ? 'block' : 'flex';
}

function login() { auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('senha').value).catch(e => alert(e.message)); }
function registrar() { auth.createUserWithEmailAndPassword(document.getElementById('email').value, document.getElementById('senha').value).catch(e => alert(e.message)); }
function logout() { auth.signOut(); toggleMenu(); }

function salvarPost() {
  const url = document.getElementById('videoUrl').value;
  const desc = document.getElementById('videoDesc').value;
  if(!url) return;
  db.collection("videos").add({
    url: url, descricao: desc, likes: 0, shares: 0, commentsCount: 0,
    uid: auth.currentUser.uid, autor: auth.currentUser.email.split('@')[0], data: new Date()
  }).then(() => { showScreen('feedScreen'); carregarVideos(); });
}

function carregarVideos() {
  const feed = document.getElementById('feed');
  db.collection("videos").orderBy("data", "desc").onSnapshot(snap => {
    feed.innerHTML = "";
    snap.forEach(doc => {
      const v = doc.data();
      const div = document.createElement("div");
      div.className = "video-container";
      div.innerHTML = `
        <video src="${v.url}" loop muted playsinline onclick="this.paused ? this.play() : this.pause()"></video>
        <div class="video-overlay"><h3>@${v.autor}</h3><p>${v.descricao}</p></div>
        <div class="side-bar-actions">
          <div class="action-item" onclick="curtir('${doc.id}')"><div class="icon-circle">❤️</div><span>${v.likes}</span></div>
          <div class="action-item" onclick="abrirComentarios('${doc.id}')"><div class="icon-circle">💬</div><span>${v.commentsCount || 0}</span></div>
          <div class="action-item" onclick="compartilhar('${doc.id}', '${v.url}')"><div class="icon-circle">🚀</div><span>${v.shares || 0}</span></div>
          ${v.uid === auth.currentUser.uid ? `<div class="action-item" onclick="excluirVideo('${doc.id}')"><div class="icon-circle" style="color:#ff4d4d">🗑️</div><span>Apagar</span></div>` : ''}
        </div>
      `;
      feed.appendChild(div);
    });
    iniciarObserver();
  });
}

function excluirVideo(id) { if(confirm("Apagar vídeo?")) db.collection("videos").doc(id).delete(); }

function abrirComentarios(id) {
  videoAtualId = id;
  document.getElementById('commentModal').style.display = 'block';
  db.collection("videos").doc(id).collection("comentarios").orderBy("data", "asc").onSnapshot(snap => {
    const list = document.getElementById('commentList');
    list.innerHTML = "";
    snap.forEach(cDoc => {
      const c = cDoc.data();
      list.innerHTML += `
        <div class="comment-item">
          <div><b>@${c.autor}</b>: ${c.texto}</div>
          ${c.uid === auth.currentUser.uid ? `<button onclick="excluirComentario('${cDoc.id}')" style="background:none; border:none; color:#666; font-size:10px;">Excluir</button>` : ''}
        </div>`;
    });
  });
}

function enviarComentario() {
  const texto = document.getElementById('newComment').value;
  if(!texto) return;
  const ref = db.collection("videos").doc(videoAtualId);
  ref.collection("comentarios").add({ autor: auth.currentUser.email.split('@')[0], uid: auth.currentUser.uid, texto: texto, data: new Date() })
    .then(() => {
      document.getElementById('newComment').value = "";
      ref.update({ commentsCount: firebase.firestore.FieldValue.increment(1) });
    });
}

function excluirComentario(cId) {
  const ref = db.collection("videos").doc(videoAtualId);
  ref.collection("comentarios").doc(cId).delete().then(() => {
    ref.update({ commentsCount: firebase.firestore.FieldValue.increment(-1) });
  });
}

function fecharComentarios() { document.getElementById('commentModal').style.display = 'none'; }
function curtir(id) { db.collection("videos").doc(id).update({ likes: firebase.firestore.FieldValue.increment(1) }); }

function compartilhar(id, url) {
  db.collection("videos").doc(id).update({ shares: firebase.firestore.FieldValue.increment(1) });
  if(navigator.share) navigator.share({ url: url });
  else { navigator.clipboard.writeText(url); alert("Link copiado!"); }
}

function iniciarObserver() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting) e.target.play().catch(()=>{}); else e.target.pause(); });
  }, { threshold: 0.6 });
  document.querySelectorAll('video').forEach(v => obs.observe(v));
}

auth.onAuthStateChanged(user => { if(user) { showScreen('feedScreen'); carregarVideos(); } else showScreen('loginScreen'); });
</script>
</body>
</html>
