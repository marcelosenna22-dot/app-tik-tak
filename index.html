<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VideoApp - TikTok Style</title>

<style>
  /* CONFIGURAÇÕES GERAIS */
  body {
    margin: 0;
    background: #000;
    color: white;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    overflow: hidden;
  }

  .screen {
    display: none;
    height: 100vh;
    width: 100vw;
    position: relative;
  }

  .active {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* FEED E SCROLL */
  #feed {
    height: 100vh;
    width: 100%;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scrollbar-width: none;
  }
  #feed::-webkit-scrollbar { display: none; }

  .video-container {
    height: 100vh;
    width: 100%;
    scroll-snap-align: start;
    position: relative;
    background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
    display: flex;
    align-items: center;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  /* INTERFACE DO PLAYER */
  .video-info {
    position: absolute;
    bottom: 40px;
    left: 15px;
    z-index: 5;
    pointer-events: none;
  }

  .video-info h3 { margin: 0; font-size: 16px; font-weight: bold; }
  .video-info p { margin: 5px 0; font-size: 14px; opacity: 0.8; }

  .side-bar {
    position: absolute;
    right: 12px;
    bottom: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
    z-index: 6;
  }

  .action-item {
    text-align: center;
    cursor: pointer;
  }

  .icon-circle {
    width: 48px;
    height: 48px;
    background: rgba(45, 45, 45, 0.5);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin-bottom: 4px;
    transition: transform 0.1s;
  }

  .icon-circle:active { transform: scale(0.85); }
  .action-item span { font-size: 12px; font-weight: bold; }

  /* NAVEGAÇÃO SUPERIOR */
  .nav-top {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
    z-index: 10;
    display: flex;
    justify-content: center;
    gap: 25px;
  }

  .nav-top button {
    background: none;
    border: none;
    color: white;
    font-size: 16px;
    font-weight: 600;
    opacity: 0.6;
    cursor: pointer;
  }

  .nav-top button.active-btn { opacity: 1; border-bottom: 2px solid white; }

  /* BOTÕES E INPUTS DE LOGIN/UPLOAD */
  input {
    padding: 14px;
    width: 80%;
    max-width: 320px;
    background: #222;
    border: 1px solid #333;
    color: white;
    border-radius: 8px;
    margin-bottom: 12px;
  }

  .main-btn {
    background: #fe2c55;
    color: white;
    border: none;
    padding: 14px 40px;
    border-radius: 4px;
    font-weight: bold;
    cursor: pointer;
    width: 85%;
    max-width: 320px;
  }
</style>
</head>

<body>

<div id="loginScreen" class="screen active">
  <h1 style="margin-bottom: 30px;">VideoApp</h1>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Senha">
  <button class="main-btn" onclick="login()">Entrar</button>
  <button onclick="registrar()" style="background:none; border:none; color:gray; margin-top:15px;">Não tem conta? Criar conta</button>
</div>

<div id="feedScreen" class="screen">
  <div class="nav-top">
    <button class="active-btn">Para você</button>
    <button onclick="mostrarUpload()">+ Postar</button>
    <button onclick="logout()">Sair</button>
  </div>
  <div id="feed"></div>
</div>

<div id="uploadScreen" class="screen active" style="display:none; background:#000;">
  <h2>Novo Post</h2>
  <p style="color: gray;">Cole o link direto do vídeo (.mp4)</p>
  <input type="text" id="videoUrl" placeholder="https://site.com/video.mp4">
  <button class="main-btn" onclick="salvarLink()">Publicar</button>
  <button onclick="voltarFeed()" style="background:none; border:none; color:white; margin-top:20px;">Voltar</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
// CONFIGURAÇÃO
const firebaseConfig = {
  apiKey: "AIzaSyCkrysWsEGHnp0XjRR7Uj8pd4e420oYqeU",
  authDomain: "app-tik-tak.firebaseapp.com",
  projectId: "app-tik-tak",
  storageBucket: "app-tik-tak.appspot.com",
  messagingSenderId: "457194424145",
  appId: "1:457194424145:web:6038c37e3044dd495fb570"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// NAVEGAÇÃO
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
  const screen = document.getElementById(id);
  screen.style.display = (id === 'feedScreen') ? 'block' : 'flex';
}

// LOGIN / REGISTRO
function login() {
  const e = document.getElementById('email').value;
  const s = document.getElementById('senha').value;
  auth.signInWithEmailAndPassword(e, s).catch(a => alert(a.message));
}

function registrar() {
  const e = document.getElementById('email').value;
  const s = document.getElementById('senha').value;
  auth.createUserWithEmailAndPassword(e, s).catch(a => alert(a.message));
}

function logout() { auth.signOut(); }

// SALVAR VÍDEO (OPÇÃO B)
function salvarLink() {
  const url = document.getElementById('videoUrl').value;
  if(!url || url.length < 10) return alert("URL inválida");

  db.collection("videos").add({
    url: url,
    likes: 0,
    data: new Date()
  }).then(() => {
    document.getElementById('videoUrl').value = "";
    showScreen('feedScreen');
    carregarVideos();
  });
}

// CARREGAR FEED
function carregarVideos() {
  const feed = document.getElementById('feed');
  db.collection("videos").orderBy("data", "desc").get().then(snap => {
    feed.innerHTML = "";
    snap.forEach(doc => {
      const v = doc.data();
      const div = document.createElement("div");
      div.className = "video-container";
      div.innerHTML = `
        <video src="${v.url}" loop muted playsinline onclick="togglePlay(this)"></video>
        <div class="video-info">
          <h3>@usuario_app</h3>
          <p>Descrição do vídeo incrível #viral</p>
        </div>
        <div class="side-bar">
          <div class="action-item" onclick="curtir('${doc.id}', this)">
            <div class="icon-circle">❤️</div>
            <span>${v.likes || 0}</span>
          </div>
          <div class="action-item">
            <div class="icon-circle">💬</div>
            <span>0</span>
          </div>
          <div class="action-item">
            <div class="icon-circle">🔄</div>
            <span>Share</span>
          </div>
        </div>
      `;
      feed.appendChild(div);
    });
    initObserver();
  });
}

// CURTIR
function curtir(id, el) {
  const span = el.querySelector("span");
  let n = parseInt(span.innerText) + 1;
  span.innerText = n;
  db.collection("videos").doc(id).update({ likes: n });
}

// PLAY/PAUSE AO TOCAR
function togglePlay(v) {
  v.paused ? v.play() : v.pause();
}

// AUTO PLAY AO ROLAR
function initObserver() {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if(e.isIntersecting) {
        e.target.play().catch(()=>{});
      } else {
        e.target.pause();
      }
    });
  }, { threshold: 0.6 });
  document.querySelectorAll('video').forEach(v => observer.observe(v));
}

function mostrarUpload() { showScreen('uploadScreen'); }
function voltarFeed() { showScreen('feedScreen'); }

// MONITOR DE LOGIN
auth.onAuthStateChanged(user => {
  if (user) {
    showScreen('feedScreen');
    carregarVideos();
  } else {
    showScreen('loginScreen');
  }
});
</script>

</body>
</html>
